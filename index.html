<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>首页</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
    background:linear-gradient(to bottom,#cceeff,#e6f7ff,#d4f8e8);
    font-family:system-ui,sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0 16px;
    /* 整体往上微调 */
    padding-bottom:8vh;
}
.main{
    width:100%;
    max-width:1000px;
}
.card{
    background:rgba(255,255,255,.95);
    border-radius:16px;
    padding:28px 32px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:40px;
}
.divider{
    width:1px;
    height:60px;
    background:#d1d5db;
}
.date-box{
    display:flex;
    align-items:center;
    gap:18px;
}
.day{
    font-size:52px;
    font-weight:700;
    line-height:1;
}
.week{
    font-size:17px;
    color:#666;
    text-align:center;
    margin-top:4px;
}
.info{
    color:#444;
    line-height:1.5;
}
.info .ym{
    font-size:18px;
    font-weight:500;
}
.info .lunar,.info .weekNum{
    font-size:15px;
    color:#666;
}
.clock{
    font-size:60px;
    font-weight:700;
    letter-spacing:2px;
}
.search{
    margin-top:30px;
}
.search form{
    display:flex;
}
.search input{
    flex:1;
    padding:16px 20px;
    font-size:17px;
    border:2px solid #22c55e;
    border-radius:8px 0 0 8px;
    outline:none;
    background:#fff;
}
.search button{
    padding:16px 36px;
    font-size:17px;
    background:#22c55e;
    color:#fff;
    border:none;
    border-radius:0 8px 8px 0;
    cursor:pointer;
}
@media(max-width:768px){
    .card{
        flex-direction:column;
        gap:20px;
        padding:24px;
    }
    .divider{display:none;}
    .clock{font-size:44px;}
}
</style>
</head>

<body>
<div class="main">
    <div class="card">
        <div class="date-box">
            <div>
                <div class="day" id="day">31</div>
                <div class="week" id="week">星期二</div>
            </div>
            <div class="info">
                <div class="ym" id="ym">2026年3月</div>
                <div class="lunar">农历二月十三</div>
                <div class="weekNum" id="weekNum">第13周</div>
            </div>
        </div>

        <div class="divider"></div>
        <div class="clock" id="clock">00:00:00</div>
    </div>

    <div class="search">
        <form action="https://www.bing.com/search" method="get" target="_blank">
            <input type="text" name="q" placeholder="必应搜索" autocomplete="off">
            <button type="submit">搜索</button>
        </form>
    </div>
</div>

<script>
function update(){
    const now=new Date()
    const y=now.getFullYear(),m=now.getMonth()+1,d=now.getDate()
    const week=["星期日","星期一","星期二","星期三","星期四","星期五","星期六"][now.getDay()]
    const first=new Date(y,0,1)
    const weekNum=Math.ceil((((now-first)/86400000)+first.getDay()+1)/7)
    const hh=String(now.getHours()).padStart(2,'0')
    const mm=String(now.getMinutes()).padStart(2,'0')
    const ss=String(now.getSeconds()).padStart(2,'0')

    document.getElementById('clock').textContent = `${hh}:${mm}:${ss}`
    document.getElementById('day').textContent = d
    document.getElementById('week').textContent = week
    document.getElementById('ym').textContent = `${y}年${m}月`
    document.getElementById('weekNum').textContent = `第${weekNum}周`
}
setInterval(update,1000);update()
</script>
</body>
</html>
