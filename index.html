<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>极速搜索</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
    background:linear-gradient(to bottom,#cceeff,#e6f7ff,#d4f8e8);
    font-family:system-ui,sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0 16px;
    /* 核心调整：通过margin-top负值让搜索框整体上移，可按需调整数值 */
    margin-top: -10vh;
}
.main{
    width:100%;
    max-width:1000px; /* 保持原搜索框最大宽度 */
}
.search{
    width:100%; /* 占满容器宽度，保持原长度 */
}
.search form{
    display:flex;
}
.search input{
    flex:1;
    padding:16px 20px; /* 保持原有内边距 */
    font-size:17px;    /* 保持原有字号 */
    border:2px solid #22c55e;
    border-radius:8px 0 0 8px;
    outline:none;
    background:#fff;
}
.search button{
    padding:16px 36px; /* 保持原有内边距 */
    font-size:17px;    /* 保持原有字号 */
    background:#22c55e;
    color:#fff;
    border:none;
    border-radius:0 8px 8px 0;
    cursor:pointer;
    /* 新增hover效果，提升体验 */
    transition: background 0.2s ease;
}
.search button:hover{
    background:#16a34a;
}
/* 移动端适配保持原有逻辑 */
@media(max-width:768px){
    .search input{
        padding:16px 20px;
    }
    .search button{
        padding:16px 36px;
    }
}
</style>
</head>
<body>
<div class="main">
    <div class="search">
        <form action="https://www.bing.com/search" method="get" target="_blank">
            <input type="text" name="q" placeholder="必应搜索" autocomplete="off">
            <button type="submit">搜索</button>
        </form>
    </div>
</div>
</body>
</html>
